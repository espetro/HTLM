# google/gemma-3-270m-it with FunctionGemma fine-tune — 268M params, 32K context
# Candidate #2 for the bake-off.
# gemma3 chat template is Gemma's <|begin_of_turn|>... format.

model_id: google/gemma-3-270m-it
formatter: gemma3
quant: null          # gemma3 270m fits in 1 x A100 80GB without quant; use 4bit to compare
lora_rank: 16
lora_alpha: 32
lora_dropout: 0.05
lora_target_modules: [q_proj, k_proj, v_proj, o_proj]
learning_rate: 2.0e-4
num_epochs: 1   # ponytail: was 3; reduced to fit 3-5hr MPS bake-off budget (see lfm config)
per_device_batch_size: 4
gradient_accumulation_steps: 4    # effective batch = 16. ponytail: tried bs=16/ga=1 for speed but MPS scales large batches poorly (step 2 took >3min); bs=4 is the proven-fast floor.
warmup_ratio: 0.1
weight_decay: 0.01
lr_scheduler: cosine
max_seq_length: 2048
train_data: data/processed/train.jsonl
eval_data: data/processed/eval.jsonl
output_dir: training/runs/functiongemma
# Precision auto-picks bf16 on CUDA/MPS. Set fp16/bf16 only to override.
gradient_checkpointing: false       # unnecessary at ≤500M on modern GPUs / Apple Silicon
